name: Undo Navigation Change

on:
  push:
    paths:
      - '.github/triggers/undo-nav-change.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  undo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Undo the navigation commit that broke deal loading
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert --no-edit 3ecd8a37e899dd1c316f8ab220e416f3031b7809
          git push
