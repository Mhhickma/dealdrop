name: Restore Homepage Deal Loading

on:
  push:
    paths:
      - '.github/triggers/create-homepage-header-test.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore-homepage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore homepage file
        run: |
          git restore --source e4329dfff5e98c4512190986087a84f1e44becc1 -- index.html
      - name: Commit changes
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Restore homepage deal loading"
          git push
