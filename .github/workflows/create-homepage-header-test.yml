name: Apply Shared Header to Homepage

on:
  push:
    paths:
      - '.github/triggers/create-homepage-header-test.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-homepage-header:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace only homepage header nav with shared header
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          original = html

          if '/site-nav.css' not in html:
              html = html.replace('</head>', '<link rel="stylesheet" href="/site-nav.css">\n</head>', 1)

          if '<div id="site-header"></div>' not in html:
              body_pos = html.lower().find('<body')
              if body_pos == -1:
                  raise SystemExit('Could not find body tag.')

              nav_start = html.lower().find('<nav', body_pos)
              nav_end = html.lower().find('</nav>', nav_start)
              if nav_start == -1 or nav_end == -1:
                  raise SystemExit('Could not find homepage nav block after body tag.')

              nav_end += len('</nav>')
              html = html[:nav_start] + '<div id="site-header"></div>' + html[nav_end:]

          if '/site-header.js' not in html:
              html = html.replace('</body>', '<script src="/site-header.js"></script>\n</body>', 1)

          if html == original:
              print('Homepage already uses shared header. No changes needed.')
          else:
              path.write_text(html, encoding='utf-8')
              print('Updated homepage header only. Existing body content and deal scripts were left in place.')
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Use shared header on homepage"
          git push
